# =============================================================================
# Alumni Association Platform — Application Configuration
# =============================================================================

spring.application.name=AlumniAssociation

# -- Logging ------------------------------------------------------------------
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.com.example.alumniassocaition1=INFO
logging.file.name=application.log

# -- PostgreSQL DataSource ----------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/alumni_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.flyway.enabled=false

# -- HikariCP Connection Pool -------------------------------------------------
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# -- JPA / Hibernate ----------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# -- File Uploads (Local fallback) --------------------------------------------
file.upload-dir=./uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# -- Cloudinary (File Uploads) ------------------------------------------------
# Set these as environment variables for production:
#   CLOUDINARY_CLOUD_NAME, CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# -- JWT Authentication -------------------------------------------------------
app.jwtSecret=${JWT_SECRET:T8yLz7qRvP2xWzGbN4cK6fJ9hMuDpS5vAHQ1sE3gVL0wIOZXCYBkFj8dMe7uP2xWzGbN4cK6fJ9hMuDpS5vAHQ1sE3gVL0wIOZXCYBkFj8dMe}
app.jwtExpirationInMs=86400000

# -- CORS Configuration -------------------------------------------------------
app.cors.allowed-origins=https://alumni-association-platform-git-main-sujeet-s-projects-351108b0.vercel.app,http://localhost:5173

# -- Server -------------------------------------------------------------------
server.port=${PORT:9090}
