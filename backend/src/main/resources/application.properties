# =============================================================================
# Alumni Association Platform - Application Configuration
# =============================================================================

spring.application.name=AlumniAssociation

# -- Logging ------------------------------------------------------------------
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.com.example.alumniassocaition1=INFO
logging.file.name=application.log

# -- PostgreSQL DataSource ----------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/alumni_db
spring.datasource.username=postgres
spring.datasource.password=root123
spring.datasource.driver-class-name=org.postgresql.Driver
spring.flyway.enabled=false

# -- HikariCP Connection Pool -------------------------------------------------
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# -- JPA / Hibernate ----------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# -- File Uploads -------------------------------------------------------------
file.upload-dir=./uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

